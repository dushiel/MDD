name:                mdd
version:             0.1.0.0
github:              "githubuser/mdd"
license:             BSD3
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2023 Author name here"

extra-source-files:
- README.md
- CHANGELOG.md
- src/Internal/Language.hs
- src/AliceLanguage/*
- src/AliceLanguage/Language1.hs
- src/AliceLanguage/Language2.hs
- src/Lib.hs
- src/MDDmanipulation.hs
- src/DotMDD.hs


# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/mdd#readme>

dependencies:
- base >= 4.7 && < 5
- containers
#- hspec >= 2.9
- bimap
- ansi-terminal
- text
- graphviz
- hashable
- unordered-containers
- fmt
- mtl


ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src

executables:
  mdd-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - mdd
  my-other-main:
    main: memo_proto.hs
    source-dirs: src
